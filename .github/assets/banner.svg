<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 120" width="860" height="120">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1793d1" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#1793d1"/>
      <stop offset="70%"  stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#6e40c9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Arch diamond -->
  <g transform="translate(48, 60)">
    <polygon points="0,-32 19,0 0,14 -19,0"
      fill="none" stroke="#1793d1" stroke-width="2"/>
    <polygon points="0,-18 10,0 0,6 -10,0"
      fill="#1793d1" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="84" y="52"
    font-family="'SF Mono','Fira Code','Cascadia Code',monospace"
    font-size="32" font-weight="700" fill="currentColor"
    letter-spacing="-0.5">antigravity-linux</text>

  <!-- Subtitle -->
  <text x="85" y="78"
    font-family="'SF Pro Text','Segoe UI','Helvetica Neue',sans-serif"
    font-size="14" fill="#8b949e" letter-spacing="0.2">
    Arch Linux installer for Google Antigravity — modular · verified · always latest
  </text>

  <!-- Gradient rule -->
  <rect x="84" y="92" width="580" height="1.5" fill="url(#line)" rx="1"/>
</svg>
