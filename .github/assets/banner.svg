<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1793d1"/>
      <stop offset="50%" style="stop-color:#6e40c9"/>
      <stop offset="100%" style="stop-color:#1793d1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)" rx="2"/>

  <!-- Arch Linux diamond icon (left) -->
  <g transform="translate(68, 100)" filter="url(#glow)">
    <polygon points="0,-38 22,0 0,18 -22,0" fill="none" stroke="#1793d1" stroke-width="2" opacity="0.9"/>
    <polygon points="0,-24 14,0 0,10 -14,0" fill="#1793d1" opacity="0.25"/>
    <line x1="0" y1="-38" x2="0" y2="18" stroke="#1793d140" stroke-width="1"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#1793d140" stroke-width="1"/>
  </g>

  <!-- Main title -->
  <text x="130" y="88" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="700" fill="#e6edf3" letter-spacing="-1">
    antigravity-arch
  </text>

  <!-- Subtitle -->
  <text x="131" y="118" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="15" font-weight="400" fill="#8b949e" letter-spacing="0.3">
    Patched installer for Google Antigravity on Arch-based Linux
  </text>

  <!-- Accent underline below title -->
  <rect x="130" y="127" width="280" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>

  <!-- Tags / pills (right side) -->
  <!-- Arch pill -->
  <g transform="translate(590, 72)">
    <rect width="110" height="28" rx="14" fill="#1793d115" stroke="#1793d140" stroke-width="1"/>
    <text x="55" y="19" font-family="monospace" font-size="12" fill="#1793d1" text-anchor="middle">Arch / CachyOS</text>
  </g>
  <!-- Fixed pill -->
  <g transform="translate(710, 72)">
    <rect width="86" height="28" rx="14" fill="#23863615" stroke="#23863640" stroke-width="1"/>
    <text x="43" y="19" font-family="monospace" font-size="12" fill="#3fb950" text-anchor="middle">awk fixed</text>
  </g>
  <!-- Auto-sync pill -->
  <g transform="translate(640, 112)">
    <rect width="118" height="28" rx="14" fill="#6e40c915" stroke="#6e40c940" stroke-width="1"/>
    <text x="59" y="19" font-family="monospace" font-size="12" fill="#a371f7" text-anchor="middle">auto-synced ↑</text>
  </g>

  <!-- Fork label bottom left -->
  <text x="130" y="170" font-family="monospace" font-size="11" fill="#484f58">
    fork of apipa12/antigravity-arch · maintained by toxicwind · 2026
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="197" width="900" height="3" fill="url(#accent)" rx="2" opacity="0.4"/>
</svg>
