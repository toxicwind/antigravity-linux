name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/apipa12/antigravity-arch.git
          git fetch upstream

      - name: Merge upstream aggressively (fork changes win on conflict)
        id: merge
        run: |
          set +e
          git merge upstream/main \
            --no-edit \
            -m "chore: sync upstream apipa12/antigravity-arch" \
            --strategy-option=ours
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -ne 0 ]; then
            echo "Merge had conflicts — resolving by keeping our version of conflicted files"
            git checkout --ours .
            git add -A
            git commit -m "chore: sync upstream (conflicts resolved, fork patches preserved)"
          fi

          echo "merge_status=$MERGE_EXIT" >> "$GITHUB_OUTPUT"

      - name: Re-apply awk EOF-flush patch
        # Ensures our fix survives even if upstream touches the same block.
        run: |
          python3 - antigravity-installer.sh <<'PYPATCH'
          import sys, re

          path = sys.argv[1]
          with open(path) as f:
              src = f.read()

          OLD = '    END{\n      if (last_ver && last_file && last_sha)\n        print last_ver, last_file, last_sha;\n    }'
          NEW = '''    END{
            # Flush final block if EOF reached without trailing blank line
            if (pkg=="antigravity" && ver!="" && file!="" && sha!="") {
              last_ver=ver; last_file=file; last_sha=sha;
            }
            if (last_ver && last_file && last_sha)
              print last_ver, last_file, last_sha;
          }'''

          if 'Flush final block' in src:
              print("awk patch already present.")
          elif OLD in src:
              with open(path, 'w') as f:
                  f.write(src.replace(OLD, NEW))
              print("awk EOF-flush patch applied.")
          else:
              print("WARNING: Could not locate expected awk END block — manual check needed.")
              sys.exit(0)
          PYPATCH

      - name: Commit patch if needed
        run: |
          if git diff --quiet; then
            echo "No patch changes needed."
          else
            git add antigravity-installer.sh
            git commit -m "fix: re-apply awk EOF-flush patch after upstream sync"
          fi

      - name: Push to fork main
        run: git push origin main
