name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint
        run: |
          shellcheck -x -e SC1090,SC1091 antigravity-installer.sh
          shellcheck -x -e SC1090,SC1091 lib/*.sh
          shellcheck -x -e SC1090,SC1091 tests/test_helper.bash

  test-ubuntu:
    name: bats (Ubuntu)
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get install -y curl
          # Install bats-core from official GitHub release (not in Ubuntu apt)
          curl -fsSL https://github.com/bats-core/bats-core/archive/refs/tags/v1.11.0.tar.gz \
            | sudo tar -xz -C /opt
          sudo ln -sf /opt/bats-core-1.11.0/bin/bats /usr/local/bin/bats
          bats --version

      - name: Run tests
        run: bats tests/

  test-arch:
    name: bats (Arch Linux)
    runs-on: ubuntu-latest
    needs: shellcheck
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Sy --noconfirm bats curl

      - name: Run tests
        run: bats tests/
