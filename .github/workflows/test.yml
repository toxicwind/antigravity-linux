name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint
        run: |
          shellcheck -x -e SC1090,SC1091 antigravity-installer.sh
          shellcheck -x -e SC1090,SC1091 lib/*.sh
          shellcheck -x -e SC1090,SC1091 tests/test_helper.bash

  test-ubuntu:
    name: bats (Ubuntu)
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Cache bats-core
        id: cache-bats
        uses: actions/cache@v4
        with:
          path: /opt/bats-core-1.11.0
          key: bats-core-1.11.0

      - name: Install bats-core
        if: steps.cache-bats.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/bats-core/bats-core/archive/refs/tags/v1.11.0.tar.gz \
            | sudo tar -xz -C /opt

      - name: Link bats
        run: |
          sudo ln -sf /opt/bats-core-1.11.0/bin/bats /usr/local/bin/bats
          bats --version

      - name: Run tests
        run: bats tests/

  test-arch:
    name: bats (Arch Linux)
    runs-on: ubuntu-latest
    needs: shellcheck
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: arch-pkgs-bats-${{ runner.os }}

      - name: Install dependencies
        run: pacman -Sy --noconfirm bats curl

      - name: Run tests
        run: bats tests/
